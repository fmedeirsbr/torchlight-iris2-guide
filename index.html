<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torchlight Infinite Iris 2 Guide Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="eyebrow">Interactive progression tracker</div>
        <h1>Torchlight Infinite Iris 2 Guide</h1>

        <div class="progress-wrap" aria-label="Checklist progress overview">
          <div class="progress-head">
            <span>Overall completion</span>
            <strong id="progress-text">0 / 20 done</strong>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="pointer-note">
            Every clickable checkbox and checklist card shows the hand cursor on
            hover.
          </p>
        </div>
      </section>

      <section class="content-layout">
        <div class="main-panel">
          <article class="panel">
            <div class="panel-head">
              <h2>Leveling checklist</h2>
              <div class="panel-controls">
                <button
                  class="toggle-completed"
                  id="toggle-completed"
                  type="button"
                  aria-pressed="false"
                >
                  Hide completed
                </button>
              </div>
            </div>

            <div class="list">
              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 1</span>
                    <div class="step-title">Make a Moto Mule</div>
                  </div>
                  <div class="skill-icons" aria-label="Level 1 portraits">
                    <img
                      src="./torchlight icons/UI_Portrait_Moto_01_128.webp"
                      alt="Commander Moto portrait"
                      loading="lazy"
                      width="64"
                      height="64"
                    />
                    <img
                      src="./torchlight icons/UI_Portrait_Iris_02_128.webp"
                      alt="Iris portrait"
                      loading="lazy"
                      width="64"
                      height="64"
                    />
                  </div>
                  <div class="step-text">
                    Create a
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Portrait_Moto_01_128.webp"
                      data-preview-alt="Moto icon preview"
                      >Moto</span
                    >, login > open friendlist (if you don't have
                    any friends online just add anybody in the chat) RMB this
                    friend > gift > stash, take the
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonIceSpiderTank_Icon_128.webp"
                      data-preview-alt="Summon Spider Tank icon preview"
                      >Summon Spider Tank</span
                    >
                    skill, put it in your stash, create an
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Portrait_Iris_02_128.webp"
                      data-preview-alt="Iris 2 icon preview"
                      >Iris 2</span
                    >, repeat the same steps to open the Stash, get the Summon Spider Skill and gogo
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 2</span>
                    <div class="step-title">Open with three summons</div>
                  </div>
                  <div class="skill-icons" aria-label="Summon skill icons">
                    <a
                      href="https://tlidb.com/Summon_Spider_Tank"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Summon Ice Spider icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_SummonIceSpiderTank_Icon_128.webp"
                        alt="Summon Ice Spider icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                    <a
                      href="https://tlidb.com/Summon_Rock_Magus"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Summon Rock Element icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skill_SummonRockElement_Icon_128.webp"
                        alt="Summon Rock Element icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                    <a
                      href="https://tlidb.com/Summon_Thunder_Magus"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Summon Thunder Element icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_SummonThunderElement_Icon_128.webp"
                        alt="Summon Thunder Element icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Use
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skill_SummonRockElement_Icon_128.webp"
                      data-preview-alt="Summon Rock Magus icon preview"
                      >Summon Rock Magus</span
                    >
                    ,
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonThunderElement_Icon_128.webp"
                      data-preview-alt="Summon Thunder Magus icon preview"
                      >Summon Thunder Magus</span
                    >
                    , and your spiders right away, keep Spider in the second
                    slot so you can later add a support skill like
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_SkillIcon_Support_MinionDamage_Icon_128.webp"
                      data-preview-alt="Servant Damage icon preview"
                      >Servant Damage</span
                    >
                    .
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 3</span>
                    <div class="step-title">Unlock Elemental Duo</div>
                  </div>
                  <div class="skill-icons" aria-label="Elemental Duo icon">
                    <a
                      href="https://tlidb.com/Elemental_Duo"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Elemental Duo icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Support_ElementalDouble_Icon_128.webp"
                        alt="Elemental Duo icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Remove
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skill_SummonRockElement_Icon_128.webp"
                      data-preview-alt="Summon Rock Magus icon preview"
                      >Summon Rock Magus</span
                    >
                    , add
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_SkillIcon_Skill_Blink_Icon_128.webp"
                      data-preview-alt="Blink icon preview"
                      >Blink</span
                    >
                    skill in the freed slot, add
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Support_ElementalDouble_Icon_128.webp"
                      data-preview-alt="Elemental Duo icon preview"
                      >Elemental Duo</span
                    >
                    skill Support to
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonThunderElement_Icon_128.webp"
                      data-preview-alt="Summon Thunder Magus icon preview"
                      >Summon Thunder Magus</span
                    >
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 7</span>
                    <div class="step-title">Swap into Summon Fire Magus</div>
                  </div>
                  <div class="skill-icons" aria-label="Summon Fire Magus icon">
                    <a
                      href="https://tlidb.com/Summon_Fire_Magus"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Summon Fire Magus icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_SummonFireElement_Icon_128.webp"
                        alt="Summon Fire Magus icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    This becomes the real summon for the run, covering a large
                    part of the map with solid early damage; (After you beat
                    Agito Punisher (The First Boss) add Increased Area Support
                    to
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonFireElement_Icon_128.webp"
                      data-preview-alt="Summon Fire Magus icon preview"
                      >Summon Fire Magus</span
                    >)
                  </div>
                </div>
              </label>

              <label
                class="check-item hover-skill-preview"
                data-preview-src="./img/treasure-trove-01.png"
                data-preview-alt="1st Trove map preview"
                data-preview-size="300"
              >
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">1st Trove</span>
                    <div class="step-title">Optional clear checkpoint</div>
                  </div>
                  <div class="step-text">
                    Run the 1st Trove once or more if you want, but a
                    <b>single clear</b>
                    is enough if your goal is only to secure the first notable.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 11</span>
                    <div class="step-title">Add spider damage</div>
                  </div>
                  <div class="skill-icons" aria-label="Spider Damage icon">
                    <a
                      href="https://tlidb.com/Servant_Damage"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Spider Damage icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Support_MinionDamage_Icon_128.webp"
                        alt="Spider Damage icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Put
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_SkillIcon_Support_MinionDamage_Icon_128.webp"
                      data-preview-alt="Servant Damage icon preview"
                      >Servant Damage</span
                    >
                    on the spiders for a small DPS boost.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 14</span>
                    <div class="step-title">Grab Dazzling Bloom</div>
                  </div>
                  <div class="skill-icons" aria-label="Dazzling Bloom icon">
                    <a
                      href="https://tlidb.com/Dazzling_Bloom"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Dazzling Bloom icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skill_DazzlingBloom_Icon_128.webp"
                        alt="Dazzling Bloom icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Small dps Boost for
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonThunderElement_Icon_128.webp"
                      data-preview-alt="Summon Thunder Magus icon preview"
                      >Summon Thunder Magus</span
                    >
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 16</span>
                    <div class="step-title">Decide on spiders</div>
                  </div>
                  <div class="skill-icons" aria-label="Level 16 skill icons">
                    <a
                      href="https://tlidb.com/Elemental_Shock"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Elemental Shock icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_ElementShake_Icon_128.webp"
                        alt="Elemental Shock icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                    <a
                      href="https://tlidb.com/Blurry_Steps"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Blurry Step icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_SkillIcon_Skill_PhasingWalk_Icon_128.webp"
                        alt="Blurry Step icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    If spiders no longer feel good, replace them with a DPS or
                    movement buff such as
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_ElementShake_Icon_128.webp"
                      data-preview-alt="Elemental Shock icon preview"
                      >Elemental Shock</span
                    >
                    or
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_SkillIcon_Skill_PhasingWalk_Icon_128.webp"
                      data-preview-alt="Blurry Step icon preview"
                      >Blurry Step</span
                    >
                    .
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Plaza of Glory Skip</span>
                    <div class="step-title">
                      Only if you want it,
                      <b>
                        <span
                          class="click-video-trigger"
                          tabindex="0"
                          data-video-src="./mp4/plaza of glory skip.mp4"
                          data-video-size="600"
                          >Click here to check how to do it</span
                        >
                      </b>
                    </div>
                  </div>
                  <div class="step-text">
                    In Plaza of Glory, after speaking with the third NPC, open
                    World Map and teleport to
                    <b>Hideout - Sanctuary of Dawn</b>, there you speak to <b>Keegan</b>, then go to the right and speak to <b>Antonius</b> and teleport to <b>Plaza of Glory</b>, then move north to <b>Cathedral Front Hall</b> 
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 22</span>
                    <div class="step-title">Rework slots and supports</div>
                  </div>
                  <div class="skill-icons" aria-label="Level 22 skill icons">
                    <a
                      href="https://tlidb.com/Magic_Dash"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Magic Dash icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skill_AccelerateAfterSpell_Icon_128.webp"
                        alt="Magic Dash icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                    <a
                      href="https://tlidb.com/Timid"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Timid icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_ElementBreak_Icon_128.webp"
                        alt="Timid icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                    <a
                      href="https://tlidb.com/Elemental_Fusion"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Elemental Fusion icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/Icon_Support_ElemetalFocus_128.webp"
                        alt="Elemental Fusion icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Remove Summon Spider Tank (slot 2) and put the dash on this
                    slot so you can have
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skill_AccelerateAfterSpell_Icon_128.webp"
                      data-preview-alt="Magic Dash icon preview"
                      >Magic Dash</span
                    >
                    support, that will allow you to go faster. For the unlocked
                    slot,
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_ElementBreak_Icon_128.webp"
                      data-preview-alt="Timid icon preview"
                      >Timid</span
                    >
                    is a solid option. And replace AOE on the main active
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_SummonFireElement_Icon_128.webp"
                      data-preview-alt="Summon Fire Magus icon preview"
                      >Summon Fire Magus</span
                    >
                    skill with
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/Icon_Support_ElemetalFocus_128.webp"
                      data-preview-alt="Elemental Fusion icon preview"
                      >Elemental Fusion</span
                    >
                    .
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 27</span>
                    <div class="step-title">Swap into Control Spell</div>
                  </div>
                  <div class="skill-icons" aria-label="Control Spell icon">
                    <a
                      href="https://tlidb.com/Control_Spell"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Control Spell icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/Icon_Support_ControlledSpell_128.webp"
                        alt="Control Spell icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    At level 27 use
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/Icon_Support_ControlledSpell_128.webp"
                      data-preview-alt="Control Spell icon preview"
                      >Control Spell</span
                    >
                    instead of
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_SkillIcon_Support_MinionDamage_Icon_128.webp"
                      data-preview-alt="Servant Damage icon preview"
                      >Servant Damage</span
                    >.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">4th Trove</span>
                    <div class="step-title">Awakened Shrine Map</div>
                  </div>
                  <div class="skill-icons" aria-label="4th Trove icon">
                    <a
                      href="https://tlidb.com/Interlocking_Soul"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Interlocking Soul hammer icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/Icon_Equip_Weapon_1HMace_Epic_104_128.webp"
                        alt="Interlocking Soul hammer icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    4th Trove (Awakened Shrine Map) - Run this one twice for 2
                    Interlocking Soul, a very powerful Legendary minion hammer.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">37 Energy</span>
                    <div class="step-title">Add your aura</div>
                  </div>
                  <div
                    class="skill-icons"
                    aria-label="Spell amplification icon"
                  >
                    <a
                      href="https://tlidb.com/Spell_Amplification"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Spell amplification icon guide on TLIdb"
                      ><img
                        src="./torchlight icons/UI_Skillicon_Skill_ElementalEnhance_Icon_128.webp"
                        alt="Spell amplification icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    When reaching 37 Energy, add aura
                    <span
                      class="hover-skill-preview"
                      tabindex="0"
                      data-preview-src="./torchlight icons/UI_Skillicon_Skill_ElementalEnhance_Icon_128.webp"
                      data-preview-alt="Spell amplification icon preview"
                      >"Spell amplification"</span
                    >
                    .
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 45</span>
                    <div class="step-title">Pick up hero memory</div>
                  </div>
                  <div class="skill-icons" aria-label="Level 45 reference icon">
                    <a
                      href="https://tlidb.com/Memory_of_Origin"
                      target="_blank"
                      rel="noopener noreferrer"
                      aria-label="Open Memory of Origin reference"
                      ><img
                        src="./torchlight icons/memory_of_origin.webp"
                        alt="Memory of Origin icon"
                        loading="lazy"
                        width="64"
                        height="64"
                    /></a>
                  </div>
                  <div class="step-text">
                    Don’t forget to pick up the hero memory from King Lionheart.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">4th Main Skill Slot</span>
                    <div class="step-title">Set the extra slot</div>
                  </div>
                  <div class="step-text">
                    Don’t forget to pick up equipment that will give you energy
                    when you reach mid act 3. You will be putting anything that
                    can give you damage there; personally, putting back AOE is a
                    solid choice.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Level 55</span>
                    <div class="step-title">Start of the map</div>
                  </div>
                  <div class="step-text">
                    Level 55 marks the start of mapping.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Timemark 1</span>
                    <div class="step-title">Glacial Abyss boss</div>
                  </div>
                  <div class="step-text">
                    One tapped the Glacial Abyss boss without any upgrade.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Timemark 2</span>
                    <div class="step-title">Flame boss</div>
                  </div>
                  <div class="step-text">Two tapped the flame boss.</div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Timemark 3</span>
                    <div class="step-title">Instant phase</div>
                  </div>
                  <div class="step-text">Instantly phased him.</div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Timemark 4</span>
                    <div class="step-title">Prepare your gear</div>
                  </div>
                  <div class="step-text">
                    Until there, keep gearing yourself up and save those embers
                    so you can craft your cane once you get one.
                  </div>
                </div>
              </label>

              <label class="check-item">
                <input type="checkbox" />
                <div class="step-body">
                  <div class="step-top">
                    <span class="step-tag">Timemark 5</span>
                    <div class="step-title">First hardship and swap</div>
                  </div>
                  <div class="step-text">
                    This is the first hardship. If you geared enough with what
                    you found on the ground it should be fine; keep progressing,
                    find a cane, craft it once you get it, then swap for
                    lightning and find a hero memory to activate your level 75
                    hero trait.
                  </div>
                </div>
              </label>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script src="./script.js" defer></script>
  </body>
